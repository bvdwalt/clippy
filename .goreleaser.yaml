version: 2

project_name: clippy

before:
  hooks:
    - go mod download

builds:
  - main: ./cmd/clippy
    binary: clippy
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

homebrew_casks:
  - repository:
      owner: bvdwalt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/bvdwalt/clippy"
    description: "Terminal clipboard history manager"
    license: "MIT"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clippy"]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: bvdwalt
    name: clippy

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
